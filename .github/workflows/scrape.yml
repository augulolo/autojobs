name: Scrape & Score

on:
  schedule:
    # Todos los días a las 08:00 ART (11:00 UTC)
    - cron: "0 11 * * *"
  workflow_dispatch: # permite correr manualmente

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run all scrapers + scoring
        run: python run_all.py

      - name: Commit updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.db
          # Solo commitea si hay cambios
          git diff --cached --quiet || git commit -m "chore: actualizar jobs.db ($(date -u +%Y-%m-%d))"
          git push
